server:
  port: 8090

spring:
  application:
    name: spring-cloud-gateway

  webflux:
    base-path: /

  cloud:
    gateway:
      actuator:
        enabled: true

      routes:
        # User Service Route
        - id: user-service-route
          uri: lb://user-service
          predicates:
            - Path=/api/users/**
          filters:
            - StripPrefix=1
          metadata:
            description: User Service - User management operations

        # Product Service Route
        - id: product-service-route
          uri: lb://product-service
          predicates:
            - Path=/api/products/**
          filters:
            - StripPrefix=1
          metadata:
            description: Product Service - Product catalog operations

        # Cart Service Route
        - id: cart-service-route
          uri: lb://cart-service
          predicates:
            - Path=/api/carts/**
          filters:
            - StripPrefix=1
          metadata:
            description: Cart Service - Shopping cart operations

        # Order Service Route
        - id: order-service-route
          uri: lb://order-service
          predicates:
            - Path=/api/orders/**
          filters:
            - StripPrefix=1
          metadata:
            description: Order Service - Order management operations

        # Composition Service - GraphQL API Route
        - id: composition-service-graphql
          uri: lb://composition-service
          predicates:
            - Path=/graphql/**
            - Method=POST
          filters:
            - StripPrefix=0

        # Composition Service - GraphiQL UI Route
        - id: composition-service-graphiql
          uri: lb://composition-service
          predicates:
            - Path=/graphiql/**
            - Method=GET
          filters:
            - StripPrefix=0

  jackson:
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    register-with-eureka: true
    fetch-registry: true
    registry-fetch-interval-seconds: 5
    instance-info-replication-interval-seconds: 5
  instance:
    prefer-ip-address: true
    lease-renewal-interval-in-seconds: 5
    lease-expiration-duration-in-seconds: 10
    metadata-map:
      zone: zone1

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,gateway
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: ${spring.application.name}

logging:
  level:
    root: INFO
    org.springframework.cloud.gateway: DEBUG
    org.springframework.security: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %logger{36} - %msg%n"

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    display-operation-id: true
  show-actuator: true